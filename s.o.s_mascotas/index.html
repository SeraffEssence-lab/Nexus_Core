<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Core | S.O.S PET</title>
    <style>
        :root {
            --nexus-bg: #030712;
            --nexus-cyan: #00f0ff;
            --nexus-purple: #bc00dd;
            --nexus-dark-blue: #0b1528;
            --nexus-panel: rgba(11, 21, 40, 0.65);
            --nexus-glow: 0 0 15px rgba(0, 240, 255, 0.4);
            --white: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
        }

        body { 
            background: var(--nexus-bg); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            color: var(--white);
        }

        #bg-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
        }

        /* Contenedor tipo Celular / Panel de Control */
        .app-shell {
            position: relative; 
            z-index: 10; 
            width: 100%; 
            max-width: 420px; 
            height: 100%;
            padding: 25px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            background: var(--nexus-panel); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid rgba(0, 240, 255, 0.15);
            border-right: 1px solid rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .header { 
            margin-top: 20px; 
            text-align: center; 
            width: 100%;
        }

        /* Contenedor del Logo con Estilo de Matriz/Ciber-Hueso */
        .logo-box {
            background: rgba(3, 7, 18, 0.8); 
            padding: 15px 30px; 
            border-radius: 20px;
            display: inline-block; 
            border: 2px solid var(--nexus-cyan);
            box-shadow: var(--nexus-glow), inset 0 0 10px rgba(0, 240, 255, 0.2);
            animation: pulseGlow 3s infinite ease-in-out;
        }

        .logo-img { 
            width: 150px; 
            display: block;
            filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.6)); 
        }

        .button-stack { 
            margin-top: 40px; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
            z-index: 15;
        }

        /* Botones Estilo Interfaz Cyberpunk de Nexus */
        .nexus-btn {
            position: relative; 
            padding: 16px 20px; 
            border-radius: 14px; 
            color: var(--white);
            font-weight: 700; 
            font-size: 1rem; 
            letter-spacing: 1px;
            display: flex; 
            align-items: center; 
            justify-content: flex-start; 
            gap: 15px;
            background: rgba(11, 21, 40, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.3); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .nexus-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.15), transparent);
            transition: 0.5s;
        }

        .nexus-btn:hover::before {
            left: 100%;
        }

        .nexus-btn:hover { 
            transform: translateY(-2px); 
            border-color: var(--nexus-cyan);
            box-shadow: var(--nexus-glow);
        }

        .nexus-btn:active { 
            transform: translateY(1px); 
        }

        /* Variaciones de acento para los bordes/iconos */
        .btn-luna { border-left: 4px solid var(--nexus-cyan); }
        .btn-vacunas { border-left: 4px solid #00a8ff; }
        .btn-vida { border-left: 4px solid #a800ff; }
        .btn-salud { border-left: 4px solid #ff0055; }

        .btn-icon {
            width: 38px; 
            height: 38px; 
            background: rgba(3, 7, 18, 0.6); 
            border-radius: 10px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.2rem; 
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        /* Panel Flotante de Fotos (Amigos/Mascotas en Red) */
        .floating-photos {
            position: absolute; 
            right: -10px; 
            top: 50%; 
            transform: translateY(-50%);
            background: rgba(3, 7, 18, 0.85); 
            padding: 15px 12px; 
            border-radius: 24px 0 0 24px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column;
            align-items: center;
            gap: 12px; 
            border: 1px solid rgba(0, 240, 255, 0.2); 
            border-right: none;
            backdrop-filter: blur(10px);
            z-index: 20;
        }

        .avatar { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.2); 
            object-fit: cover; 
            background: #111827; 
            transition: all 0.3s;
            cursor: pointer;
        }
        .avatar:hover {
            border-color: var(--nexus-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        /* MODALES DEL SISTEMA OPERATIVO */
        .nexus-modal {
            display: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(3, 7, 18, 0.95); 
            z-index: 200; 
            padding: 30px 20px; 
            backdrop-filter: blur(12px);
            overflow-y: auto;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .close-modal { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            font-size: 2rem; 
            cursor: pointer; 
            color: rgba(255,255,255,0.6);
            transition: 0.3s;
        }
        .close-modal:hover { color: var(--nexus-cyan); }

        .photo-grid-modal { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            margin-top: 25px; 
        }

        .photo-item { 
            position: relative; 
            display: flex;
            justify-content: center;
        }

        .btn-delete {
            position: absolute; 
            top: -5px; 
            right: -5px; 
            background: #ff0055; 
            color: white;
            border: none; 
            border-radius: 50%; 
            width: 22px; 
            height: 22px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            box-shadow: 0 0 8px rgba(255, 0, 85, 0.5);
        }

        /* TARJETAS DE PRODUCTOS / SERVICIOS */
        .catalog-item {
            background: rgba(11, 21, 40, 0.8); 
            color: var(--white); 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .catalog-item h3 {
            font-size: 1.15rem;
            color: var(--nexus-cyan);
            margin-bottom: 8px;
        }

        /* BOTONES DE ACCIÓN DE COMPRA */
        .btn-action {
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100%; 
            padding: 14px; 
            margin-top: 12px;
            text-align: center; 
            text-decoration: none; 
            border-radius: 10px;
            font-weight: bold; 
            color: white; 
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        .btn-whats { 
            background: #057e38; 
            border: 1px solid #25d366;
        }
        .btn-whats:hover {
            background: #25d366;
            box-shadow: 0 0 12px rgba(37, 211, 102, 0.4);
        }
        .btn-paypal { 
            background: #00457c; 
            border: 1px solid #0070ba;
        }
        .btn-paypal:hover {
            background: #0070ba;
            box-shadow: 0 0 12px rgba(0, 112, 186, 0.4);
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: var(--nexus-glow), inset 0 0 10px rgba(0, 240, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(0, 240, 255, 0.7), inset 0 0 15px rgba(0, 240, 255, 0.4); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-shell">
        <div class="header">
            <div class="logo-box">
                <img src="hueso S.O.S PET logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/200x100/0b1528/00f0ff?text=S.O.S+PET+CORE'">
            </div>
        </div>

        <div class="button-stack">
            <button class="nexus-btn btn-luna" onclick="openCategory('luna')">
                <div class="btn-icon">🐶</div> LUNA ENGINE
            </button>
            <button class="nexus-btn btn-vacunas" onclick="openCategory('vacunas')">
                <div class="btn-icon">💉</div> CARTILLA & SOCIOS
            </button>
            <button class="nexus-btn btn-vida" onclick="openCategory('vida')">
                <div class="btn-icon">🥗</div> ESTILO DE VIDA
            </button>
            <button class="nexus-btn btn-salud" onclick="openCategory('salud')">
                <div class="btn-icon">🏥</div> SALUD DIGITAL
            </button>
        </div>

        <div class="floating-photos">
            <p style="font-size: 0.55rem; font-weight: 800; text-align: center; color: var(--nexus-cyan); letter-spacing: 1px; margin-bottom: 8px;">RED_PET</p>
            <div id="photoList"></div>
            <div class="avatar" onclick="openGalleryEditor()" style="display:flex; align-items:center; justify-content:center; background:rgba(0,240,255,0.05); color:var(--nexus-cyan); font-weight:bold; border: 1px dashed var(--nexus-cyan);">+</div>
        </div>
    </div>

    <div id="modalGallery" class="nexus-modal">
        <span class="close-modal" onclick="closeGallery()">×</span>
        <h2 style="text-align:center; font-size: 1.3rem; letter-spacing: 1px; color: var(--nexus-cyan);">ALMACENAMIENTO MULTIMEDIA</h2>
        <label class="nexus-btn btn-luna" style="margin: 25px auto; width: fit-content; justify-content: center;">
            SUBIR NUEVA MATRIZ 📸
            <input type="file" id="uploadPhoto" accept="image/*" style="display:none;">
        </label>
        <div id="photoGrid" class="photo-grid-modal"></div>
    </div>

    <div id="screenCatalog" class="nexus-modal">
        <span class="close-modal" onclick="this.parentElement.style.display='none'">×</span>
        <h2 id="catTitle" style="text-align:center; font-size: 1.3rem; letter-spacing: 1px; color: var(--nexus-cyan); margin-bottom:25px;"></h2>
        <div id="gridContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const whatsappNumber = "5215539271072";
        const paypalUser = "marketingempresarial@gmail.com";

        // Mapeo de Base de Datos de Servicios
        const db = {
            'luna': [{name: 'Perfil Luna Pro', price: 150, info: 'Sincronización total con la red e historial en tiempo real.'}],
            'vacunas': [
                {name: 'Cartilla Digital', price: 85, info: 'Monitoreo clínico descentralizado en tu terminal.'},
                {name: 'Socio: Veterinaria Canina', price: 0, info: 'Descuento del 10% activo en nodo Chicoloapan.'}
            ]
        };

        // GESTIÓN DE MATRICES DE IMAGEN (Local Storage)
        let petPhotos = JSON.parse(localStorage.getItem('pet_photos')) || [];
        function openGalleryEditor() { document.getElementById('modalGallery').style.display = 'block'; renderGallery(); }
        function closeGallery() { document.getElementById('modalGallery').style.display = 'none'; }

        document.getElementById('uploadPhoto').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                petPhotos.push(reader.result);
                localStorage.setItem('pet_photos', JSON.stringify(petPhotos));
                renderGallery();
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function deletePhoto(idx) {
            petPhotos.splice(idx, 1);
            localStorage.setItem('pet_photos', JSON.stringify(petPhotos));
            renderGallery();
        }

        function renderGallery() {
            const side = document.getElementById('photoList');
            const grid = document.getElementById('photoGrid');
            side.innerHTML = ''; grid.innerHTML = '';
            petPhotos.forEach((src, i) => {
                side.innerHTML += `<img src="${src}" class="avatar" style="margin-bottom:8px;">`;
                grid.innerHTML += `<div class="photo-item"><img src="${src}" class="avatar" style="width:75px;height:75px;border-radius:12px;"><button class="btn-delete" onclick="deletePhoto(${i})">X</button></div>`;
            });
        }

        // CONTROL DE ACCESO A NODOS DE CATÁLOGO
        function openCategory(cat) {
            const container = document.getElementById('gridContainer');
            document.getElementById('catTitle').innerText = `SISTEMA // ${cat.toUpperCase()}`;
            document.getElementById('screenCatalog').style.display = 'block';
            container.innerHTML = '';

            if(db[cat]) {
                db[cat].forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'catalog-item';
                    
                    const paypalBtn = p.price > 0 ? `
                        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${paypalUser}&item_name=${p.name}&amount=${p.price}&currency_code=MXN" class="btn-action btn-paypal">
                            EJECUTAR PAGO PAYPAL ($${p.price} MXN)
                        </a>` : '';

                    item.innerHTML = `
                        <h3>${p.name}</h3>
                        <p style="color:rgba(255,255,255,0.7); margin:10px 0; font-size:0.9rem; line-height:1.4;">${p.info}</p>
                        <a href="https://wa.me/${whatsappNumber}?text=NEXUS_CORE: Solicito información de terminal: ${p.name}" class="btn-action btn-whats">SOLICITAR CONEXIÓN WHATSAPP</a>
                        ${paypalBtn}
                    `;
                    container.appendChild(item);
                });
            } else {
                container.innerHTML = `<p style="text-align:center; color:rgba(255,255,255,0.4); margin-top:40px;">Módulo en desarrollo. Esperando sincronización del núcleo.</p>`;
            }
        }

        /* SHADER RE-INGENIERADO: Fondo de Matriz Fluida de Ondas de Datos Nexus */
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const material = new THREE.ShaderMaterial({
            uniforms: { u_time: { value: 0 }, u_res: { value: new THREE.Vector2() } },
            vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
            fragmentShader: `
                precision highp float; 
                uniform float u_time; 
                uniform vec2 u_res; 
                void main(){ 
                    vec2 uv = gl_FragCoord.xy/u_res.xy; 
                    // Algoritmo de ondas oscuras de Nexus Core
                    float wave = sin(uv.x * 4.0 + u_time * 0.6) * cos(uv.y * 3.0 - u_time * 0.4) * 0.5 + 0.5;
                    vec3 baseDark = vec3(0.011, 0.027, 0.054); // Azul profundo Nexus
                    vec3 neonCyan = vec3(0.0, 0.45, 0.55);     // Brillo cian atenuado de fondo
                    gl_FragColor = vec4(mix(baseDark, neonCyan, wave * 0.25), 1.0); 
                }`
        });
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));
        
        function animate(t) {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
            material.uniforms.u_time.value = t * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(0); renderGallery();
    </script>
</body>
</html>
