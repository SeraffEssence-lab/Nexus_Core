<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.S PET | Playful Edition</title>

    <link rel="apple-touch-icon" href="https://seraffessence-lab.github.io/Nexus_Core/s.o.s_mascotas/hueso%20S.O.S%20PET%20logo.png">
    
    <link rel="icon" type="image/png" href="https://seraffessence-lab.github.io/Nexus_Core/s.o.s_mascotas/hueso%20S.O.S%20PET%20logo.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="S.O.S Pet">

    <style>
        :root {
            --grass-bright: #4fb932;
            --grass-dark: #3a8e25;
            --btn-orange: #ff9d42;
            --btn-blue: #42d1ff;
            --btn-yellow: #ffdf42;
            --btn-pink: #ff6b81;
            --white: #ffffff;
            --paypal-blue: #003087;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rounded Mplus 1c', 'Segoe UI', sans-serif; }

        body { background: var(--grass-dark); height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .app-shell {
            position: relative; z-index: 10; width: 100%; max-width: 420px; height: 100%;
            padding: 20px; display: flex; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(8px);
        }

        .header { margin-top: 30px; text-align: center; }
        .logo-box {
            background: white; padding: 15px 40px; border-radius: 60px;
            box-shadow: 0 10px 0 #ddd; display: inline-block; transform: rotate(-3deg);
        }
        .logo-img { width: 180px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }

        .button-stack { margin-top: 40px; width: 100%; display: flex; flex-direction: column; gap: 20px; }

        .candy-btn {
            position: relative; padding: 18px 25px; border-radius: 25px; color: white;
            font-weight: 900; font-size: 1.1rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            border: none; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .candy-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        .btn-luna { background: var(--btn-orange); border-bottom: 6px solid #d47a2a; }
        .btn-vacunas { background: var(--btn-blue); border-bottom: 6px solid #2a96b9; }
        .btn-vida { background: var(--btn-yellow); border-bottom: 6px solid #c9ae2a; color: #5c4d00; }
        .btn-salud { background: var(--btn-pink); border-bottom: 6px solid #c93a4e; }

        .btn-icon {
            width: 45px; height: 45px; background: white; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; box-shadow: inset 0 -4px 0 #ddd;
        }

        .floating-photos {
            position: absolute; left: -15px; top: 50%; transform: translateY(-50%);
            background: #fff9e6; padding: 15px 10px; border-radius: 0 30px 30px 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;
            gap: 12px; border: 3px solid #ffdf42; z-index: 20;
        }

        .avatar { width: 55px; height: 55px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; background: #eee; }

        /* MODALES */
        #modalGallery, #screenCatalog {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; padding: 30px; backdrop-filter: blur(10px);
            color: white; overflow-y: auto;
        }

        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; font-weight: bold; }
        .photo-grid-modal { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .photo-item { position: relative; }
        .btn-delete {
            position: absolute; top: -5px; right: -5px; background: #ff4b4b; color: white;
            border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer;
        }

        /* BOTONES DE COMPRA */
        .btn-action {
            display: block; width: 100%; padding: 12px; margin-top: 10px;
            text-align: center; text-decoration: none; border-radius: 12px;
            font-weight: bold; color: white; transition: 0.3s;
        }
        .btn-whats { background: #25d366; }
        .btn-paypal { background: #0070ba; border-bottom: 4px solid #003087; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-shell">
        <div class="header">
            <div class="logo-box">
                <img src="hueso S.O.S PET logo.png" class="logo-img" onerror="this.src='https://via.placeholder.com/200x100?text=S.O.S+PET'">
            </div>
        </div>

        <div class="button-stack">
            <button class="candy-btn btn-luna" onclick="openCategory('luna')">
                <div class="btn-icon">🐶</div> LUNA
            </button>
            <button class="candy-btn btn-vacunas" onclick="openCategory('vacunas')">
                <div class="btn-icon">💉</div> CARTILLA & SOCIOS
            </button>
            <button class="candy-btn btn-vida" onclick="openCategory('vida')">
                <div class="btn-icon">🥗</div> ESTILO DE VIDA
            </button>
            <button class="candy-btn btn-salud" onclick="openCategory('salud')">
                <div class="btn-icon">🏥</div> SALUD DIGITAL
            </button>
        </div>

        <div class="floating-photos">
            <p style="font-size: 0.5rem; font-weight: 900; text-align: center; color: #ff9d42; margin-bottom: 5px;">AMIGOS</p>
            <div id="photoList"></div>
            <div class="avatar" onclick="openGalleryEditor()" style="display:flex; align-items:center; justify-content:center; background:white; color:#ff9d42; font-weight:bold; cursor:pointer; border: 2px dashed #ff9d42;">+</div>
        </div>
    </div>

    <div id="modalGallery">
        <span class="close-modal" onclick="closeGallery()">×</span>
        <h2 style="text-align:center;">EDITOR DE FOTOS</h2>
        <label class="candy-btn btn-luna" style="margin: 20px auto; width: fit-content;">
            AÑADIR FOTO 📸
            <input type="file" id="uploadPhoto" accept="image/*" style="display:none;">
        </label>
        <div id="photoGrid" class="photo-grid-modal"></div>
    </div>

    <div id="screenCatalog">
        <span class="close-modal" onclick="this.parentElement.style.display='none'">×</span>
        <h2 id="catTitle" style="text-align:center; margin-bottom:20px;"></h2>
        <div id="gridContainer"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const whatsappNumber = "5215539271072";
        const paypalUser = "marketingempresarial@gmail.com";

        const db = {
            'luna': [{name: 'Perfil Luna Pro', price: 150, info: 'Acceso total a funciones premium.'}],
            'vacunas': [
                {name: 'Cartilla Digital', price: 85, info: 'Historial clínico en tu mano.'},
                {name: 'Socio: Veterinaria Canina', price: 0, info: 'Descuento 10% en Chicoloapan.'}
            ]
        };

        // GESTIÓN DE FOTOS
        let petPhotos = JSON.parse(localStorage.getItem('pet_photos')) || [];
        function openGalleryEditor() { document.getElementById('modalGallery').style.display = 'block'; renderGallery(); }
        function closeGallery() { document.getElementById('modalGallery').style.display = 'none'; }

        document.getElementById('uploadPhoto').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                petPhotos.push(reader.result);
                localStorage.setItem('pet_photos', JSON.stringify(petPhotos));
                renderGallery();
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        function deletePhoto(idx) {
            petPhotos.splice(idx, 1);
            localStorage.setItem('pet_photos', JSON.stringify(petPhotos));
            renderGallery();
        }

        function renderGallery() {
            const side = document.getElementById('photoList');
            const grid = document.getElementById('photoGrid');
            side.innerHTML = ''; grid.innerHTML = '';
            petPhotos.forEach((src, i) => {
                side.innerHTML += `<img src="${src}" class="avatar" style="margin-bottom:8px;">`;
                grid.innerHTML += `<div class="photo-item"><img src="${src}" class="avatar" style="width:80px;height:80px;"><button class="btn-delete" onclick="deletePhoto(${i})">X</button></div>`;
            });
        }

        // CATÁLOGO Y PAGOS
        function openCategory(cat) {
            const container = document.getElementById('gridContainer');
            document.getElementById('catTitle').innerText = cat.toUpperCase();
            document.getElementById('screenCatalog').style.display = 'block';
            container.innerHTML = '';

            if(db[cat]) {
                db[cat].forEach(p => {
                    const item = document.createElement('div');
                    item.style.cssText = "background:white; color:black; padding:20px; border-radius:20px; margin-bottom:20px;";
                    
                    // Lógica del botón PayPal
                    const paypalBtn = p.price > 0 ? `
                        <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${paypalUser}&item_name=${p.name}&amount=${p.price}&currency_code=MXN" class="btn-action btn-paypal">
                            PAGAR CON PAYPAL ($${p.price} MXN)
                        </a>` : '';

                    item.innerHTML = `
                        <h3>${p.name}</h3>
                        <p style="color:#666; margin:10px 0;">${p.info}</p>
                        <a href="https://wa.me/${whatsappNumber}?text=Hola, quiero info de: ${p.name}" class="btn-action btn-whats">CONTACTAR WHATSAPP</a>
                        ${paypalBtn}
                    `;
                    container.appendChild(item);
                });
            }
        }

        // FONDO (Manteniendo tu estilo)
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const material = new THREE.ShaderMaterial({
            uniforms: { u_time: { value: 0 }, u_res: { value: new THREE.Vector2() } },
            vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
            fragmentShader: `precision highp float; uniform float u_time; uniform vec2 u_res; void main(){ vec2 uv = gl_FragCoord.xy/u_res.xy; float w = sin(uv.x*5.0+u_time)*0.5+0.5; gl_FragColor = vec4(mix(vec3(0.23,0.56,0.15), vec3(0.31,0.73,0.2), w), 1.0); }`
        });
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), material));
        function animate(t) {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
            material.uniforms.u_time.value = t * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(0); renderGallery();
    </script>
</body>
</html>
