<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicoloapan Sport - Elite UI</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #05070a; font-family: 'Inter', sans-serif; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Capa de Interfaz */
        .ui-layer { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 0; box-sizing: border-box; pointer-events: none; }

        .title { font-size: 2.8rem; font-weight: 800; color: #E0E6ED; text-transform: uppercase; letter-spacing: 6px; text-align: center; filter: drop-shadow(0 0 10px rgba(158, 208, 216, 0.3)); }

        .btn-group { display: flex; flex-direction: column; gap: 25px; pointer-events: auto; }

        /* Botones con Relieve Cristalino */
        .glass-btn {
            width: 150px; height: 150px; border-radius: 50%;
            background: rgba(224, 230, 237, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #9ED0D8; font-weight: 700; font-size: 0.8rem; letter-spacing: 2px;
            text-decoration: none; transition: 0.4s;
            box-shadow: inset 0 4px 15px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.5);
        }
        .glass-btn:hover { transform: scale(1.1); border-color: #9ED0D8; box-shadow: 0 0 25px rgba(158, 208, 216, 0.4); }

        /* Portal QR de Alta Precisión */
        .qr-portal {
            width: 180px; height: 180px; border-radius: 30px;
            background: rgba(15, 20, 25, 0.4);
            border: 2px solid rgba(158, 208, 216, 0.2);
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .qr-portal::before { content: ''; position: absolute; inset: -5px; border: 2px solid #9ED0D8; border-radius: 35px; clip-path: polygon(0 0, 30% 0, 30% 10%, 0 10%, 0 30%, 10% 30%, 10% 0, 0 0); } /* Esquina UI */
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui-layer">
        <div class="title">CHICOLOAPAN<br>SPORT</div>
        
        <div class="btn-group">
            <a href="#" class="glass-btn"><span>ENTRENAR</span></a>
            <a href="#" class="glass-btn"><span>ADMIN</span></a>
            <a href="#" class="glass-btn"><span>Notifisios</span></a>
      
        </div>

        <div class="qr-portal">
            <div style="color: #9ED0D8; font-size: 0.7rem; opacity: 0.5;">[ QR SENSOR ACTIVE ]</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Shader de Textura de Relieve en Tiempo Real (Anomalía Texture)
        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_mouse;
            uniform vec2 u_res;
            varying vec2 vUv;

            void main() {
                vec2 st = gl_FragCoord.xy / u_res.xy;
                vec2 m = u_mouse / u_res.xy;
                
                // Generar distorsión de flujo magnético
                float d = distance(st, m);
                float strength = 0.15 / (d + 0.3);
                
                vec2 uv = st;
                for(float i = 1.0; i < 4.0; i++){
                    uv.x += 0.2 / i * sin(i * 3.0 * uv.y + u_time * 0.5 + st.x * 5.0);
                    uv.y += 0.2 / i * cos(i * 3.0 * uv.x + u_time * 0.5 + st.y * 5.0);
                }
                
                // Cálculo de luz y relieve (Normal Mapping sim)
                float noise = sin(uv.x * 20.0) * cos(uv.y * 20.0);
                vec3 normal = normalize(vec3(dFdx(noise), dFdy(noise), 0.1));
                vec3 lightDir = normalize(vec3(m - st, 0.5));
                float diff = max(dot(normal, lightDir), 0.0);
                
                // Colores Metal-Pastel
                vec3 color = mix(vec3(0.02, 0.03, 0.04), vec3(0.62, 0.82, 0.85), diff * strength);
                gl_FragColor = vec4(color + (noise * 0.03), 1.0);
            }
        `;

        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 1.0); }`;

        let scene, camera, renderer, material;
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas') });
            renderer.setSize(window.innerWidth, window.innerHeight);

            material = new THREE.ShaderMaterial({
                uniforms: { u_time: { value: 0 }, u_mouse: { value: new THREE.Vector2() }, u_res: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
                vertexShader, fragmentShader
            });

            scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
        }

        window.addEventListener('mousemove', e => { material.uniforms.u_mouse.value.set(e.clientX, window.innerHeight - e.clientY); });
        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); material.uniforms.u_res.value.set(window.innerWidth, window.innerHeight); });

        function animate(t) {
            material.uniforms.u_time.value = t * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
