<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERAFF | SUISSE - ELITE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow-x: hidden; background-color: #000; color: #d4af37; font-family: 'Montserrat', sans-serif; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        ::-webkit-scrollbar { width: 0px; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; z-index: 5; }
        .active { display: flex; }

        /* PANTALLA DE INICIO (SIN CONTRASEÑA) */
        .login-box { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 40px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            text-align: center; 
            backdrop-filter: blur(15px); 
            width: 100%; 
            max-width: 350px; 
            margin-top: 25vh; 
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .title { font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 8px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 15px rgba(163, 220, 229, 0.5); }
        .subtitle { font-size: 0.6rem; letter-spacing: 4px; color: #a3dce5; text-transform: uppercase; margin-bottom: 40px; opacity: 0.7; }
        
        .btn-enter { 
            background: transparent; 
            border: 1px solid #a3dce5; 
            color: #a3dce5; 
            padding: 15px 50px; 
            cursor: pointer; 
            font-family: 'Cinzel', serif; 
            letter-spacing: 5px; 
            transition: 0.5s;
            font-weight: bold;
        }
        .btn-enter:hover { background: #a3dce5; color: #000; box-shadow: 0 0 20px #a3dce5; }

        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 450px; margin-top: 40px; }
        .menu-item { height: 120px; background-size: cover; background-position: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .menu-item:hover { transform: scale(1.02); border-color: #a3dce5; }
        .mo-title { font-family: 'Cinzel', serif; font-size: 1.2rem; color: #fff; letter-spacing: 2px; background: rgba(0,0,0,0.7); padding: 10px 20px; border: 1px solid #d4af37; }
        
        .musa-item { border: 2px solid #ffb6c1 !important; box-shadow: 0 0 15px rgba(212,142,142,0.3); }
        .musa-txt { color: #ffb6c1 !important; border-color: #ffb6c1 !important; }

        .products-grid { display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 400px; padding-top: 100px; padding-bottom: 100px; }
        .prod-card { width: 100%; padding: 20px; border: 1px solid rgba(163, 220, 229, 0.2); background: rgba(5,5,5,0.9); text-align: center; border-radius: 15px; }
        .prod-img { width: 100%; height: auto; margin-bottom: 15px; border-bottom: 1px solid #222; border-radius: 10px; }
        .prod-name { font-family: 'Cinzel', serif; color: #fff; font-size: 1.4rem; margin-bottom: 8px; }
        .prod-price { color: #a3dce5; font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; }
        .btn-buy { width: 100%; background: #fff; color: #000; padding: 15px 0; font-size: 0.8rem; letter-spacing: 2px; font-weight: bold; cursor: pointer; display: block; text-decoration: none; margin-bottom: 10px; border-radius: 5px; }
        .btn-whats { background: transparent; border: 1px solid #25D366; color: #25D366; }

        .back-btn { position: fixed; top: 20px; left: 20px; color: #fff; cursor: pointer; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px 15px; border: 1px solid #a3dce5; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="screenLogin" class="screen active">
        <div class="login-box">
            <div class="title">SERAFF</div>
            <div class="subtitle">Ecosistema Desbloqueado // Nivel 102</div>
            <button class="btn-enter" onclick="switchScreen('screenMenu')">ACCEDER</button>
        </div>
    </div>

    <div id="screenMenu" class="screen">
        <div class="menu-container">
            <div class="menu-item" style="background-image: url('caos.jpg');" onclick="openCategory('caos')"><div class="mo-title">EL CAOS</div></div>
            <div class="menu-item" style="background-image: url('origen.jpg');" onclick="openCategory('origen')"><div class="mo-title">EL ORIGEN</div></div>
            <div class="menu-item" style="background-image: url('legado.jpg');" onclick="openCategory('legado')"><div class="mo-title">EL LEGADO</div></div>
            <div class="menu-item" style="background-image: url('dominio.jpg');" onclick="openCategory('dominio')"><div class="mo-title">EL DOMINIO</div></div>
            <div class="menu-item musa-item" style="background-image: url('musa.jpg');" onclick="openCategory('musa')"><div class="mo-title musa-txt">SERAFF MUSA</div></div>
        </div>
    </div>

    <div id="screenCatalog" class="screen">
        <div class="back-btn" onclick="switchScreen('screenMenu')">VOLVER</div>
        <h2 id="catTitle" class="title" style="font-size: 1.8rem; margin-top: 80px;"></h2>
        <div class="products-grid" id="gridContainer"></div>
    </div>

    <script>
        const whatsappNumber = "5215539271072"; 
        const paypalUser = "marketingesmpresarial@gmail.com"; 
        const precioMXN = 85;

        const db = {
            'caos': [
                {name:'Fruta King', img:'311.jpg'}, {name:'Coqueto', img:'312.jpg'}, 
                {name:'Coqueto cuero', img:'313.jpg'}, {name:'Red citrico', img:'314.jpg'}, {name:'Valentina street', img:'315.jpg'}
            ],
            'origen': [
                {name:'DANNLV', img:'111.jpg'}, {name:'2023', img:'112.jpg'},
                {name:'Playa Pink', img:'113.jpg'}, {name:'Old Moderno', img:'114.jpg'}, {name:'Muse Miss', img:'115.jpg'}
            ],
            'legado': [
                {name:'Sunset Sun', img:'211.jpg'}, {name:'Sándalo', img:'212.jpg'},
                {name:'La Fama', img:'213.jpg'}, {name:'SalvajeDep', img:'214.jpg'}, {name:'Crudo Rey', img:'215.jpg'}
            ],
            'dominio': [
                {name:'ZIIQIIONE', img:'411.jpg'}, {name:'Apple Clean', img:'412.jpg'},
                {name:'MandarinaScy', img:'413.jpg'}, {name:'OudRosa', img:'414.jpg'}, {name:'Iris Intenso', img:'415.jpg'}
            ],
            'musa': [
                {name:'Aura Silk', img:'511.jpg'}, {name:'Belle Legacy', img:'512.jpg'},
                {name:'Valentinaskyline', img:'513.jpg'}, {name:'Musa Supreme', img:'514.jpg'}, {name:'Ponche Frutal', img:'515.jpg'}
            ]
        };

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            window.scrollTo(0,0);
        }

        function openCategory(cat) {
            const container = document.getElementById('gridContainer');
            document.getElementById('catTitle').innerText = cat === 'musa' ? 'SERAFF MUSA' : cat.toUpperCase();
            container.innerHTML = '';
            db[cat].forEach(p => {
                const card = document.createElement('div');
                card.className = 'prod-card';
                card.innerHTML = `
                    <img src="${p.img}" class="prod-img" onerror="this.src='https://via.placeholder.com/400x400?text=SERAFF+PROD'">
                    <div class="prod-name">${p.name}</div>
                    <div class="prod-price">$${precioMXN} MXN</div>
                    <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=${paypalUser}&amount=${precioMXN}&item_name=${p.name}" target="_blank" class="btn-buy">PAYPAL</a>
                    <a href="https://wa.me/${whatsappNumber}?text=Deseo:${p.name}" target="_blank" class="btn-buy btn-whats">WHATSAPP</a>
                `;
                container.appendChild(card);
            });
            switchScreen('screenCatalog');
        }

        // --- FONDO 3D NUEVA TEXTURA (NEXUS FREQUENCY) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Geometría de Partículas (Efecto de "Red de Energía")
        const geometry = new THREE.IcosahedronGeometry(2, 2);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xa3dce5, // Color Nexus Blue
            wireframe: true,
            transparent: true,
            opacity: 0.15
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // Agregamos puntos de luz para que brille
        const pointsGeometry = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i=0; i<particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 15;
        }
        pointsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const pointsMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0xa3dce5 });
        const pointsMesh = new THREE.Points(pointsGeometry, pointsMaterial);
        scene.add(pointsMesh);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += 0.003;
            mesh.rotation.x += 0.002;
            pointsMesh.rotation.y -= 0.001;
            
            // Efecto latido
            const scale = 1 + Math.sin(Date.now() * 0.001) * 0.1;
            mesh.scale.set(scale, scale, scale);
            
            renderer.render(scene, camera);
        }
        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
