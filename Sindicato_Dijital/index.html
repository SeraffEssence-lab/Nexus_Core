<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serafín - Despacho de Élite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050507; font-family: 'Courier New', monospace; }

        /* CAPAS DE FONDO */
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                    background: radial-gradient(circle, transparent 20%, #000 120%); z-index: 2; pointer-events: none; }

        /* PANTALLA 1: EL BÚHO (PORTAL) */
        #portal { position: relative; z-index: 10; display: flex; flex-direction: column; 
                  align-items: center; justify-content: center; height: 100vh; transition: opacity 0.8s, transform 0.8s; }
        .owl-main { width: 80%; max-width: 450px; filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4)); 
                    cursor: pointer; transition: 0.5s; }
        .owl-main:hover { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 50px rgba(212, 175, 55, 0.6)); }

        /* PANTALLA 2: ECOSISTEMA (MARCAS) */
        #ecosistema { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; 
                      display: flex; flex-direction: column; align-items: center; justify-content: center;
                      opacity: 0; visibility: hidden; transition: 1s; transform: translateY(50px); }
        #ecosistema.active { opacity: 1; visibility: visible; transform: translateY(0); z-index: 15; }

        .brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; width: 80%; }
        .brand-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); 
                      padding: 40px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px);
                      color: #d4af37; letter-spacing: 3px; font-weight: bold; transition: 0.4s; }
        .brand-card:hover { background: rgba(212,175,55,0.1); border-color: #d4af37; transform: scale(1.1); }

        .hidden { opacity: 0; visibility: hidden; transform: scale(0.9); }
    </style>
</head>
<body>

    <canvas id="liquid-relief"></canvas>
    <div class="vignette"></div>

    <div id="portal">
        <img src="Buho_bascula inicio.png" class="owl-main" id="btn-entrar" alt="CORE">
        <h2 style="color:#d4af37; margin-top:20px; letter-spacing:10px; font-size:1rem; opacity:0.7;">INICIAR_SISTEMA</h2>
    </div>

    <div id="ecosistema">
        <h1 style="color:#fff; margin-bottom:50px; letter-spacing:15px; font-size:1.5rem;">ECOSISTEMA_JSL</h1>
        <div class="brand-grid">
            <div class="brand-card">SERAFF ESSENCE</div>
            <div class="brand-card">SCENCE</div>
            <div class="brand-card">NATULUXURY</div>
            <div class="brand-card">JE_LEGAL</div>
        </div>
        <button onclick="location.reload()" style="margin-top:50px; background:none; border:1px solid #d4af37; color:#d4af37; padding:10px 20px; cursor:pointer;">REINICIAR_NODO</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- SHADER DE RELIEVE 3D TIPO LÍQUIDO ---
        const canvas = document.getElementById('liquid-relief');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        const fragmentShader = `
            precision highp float;
            uniform float u_time;
            uniform vec2 u_res;

            // Función de ruido para el relieve
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

            float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i = floor(v + dot(v, C.yy));
                vec2 x0 = v - i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod289(i);
                vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m; m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
                vec3 g;
                g.x = a0.x * x0.x + h.x * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / u_res.xy;
                float t = u_time * 0.2;
                
                // Generamos relieve 3D a través de ruido acumulado
                float noise = snoise(uv * 3.0 + t * 0.5) * 0.5;
                noise += snoise(uv * 5.0 - t * 0.3) * 0.25;

                // Simulamos luz rebotando en el relieve
                float light = smoothstep(0.0, 0.1, noise - snoise(uv * 3.1 + t * 0.5));
                
                // Color Gris Negro con reflejos de luz de relieve
                vec3 darkGrey = vec3(0.03, 0.04, 0.06);
                vec3 highlight = vec3(0.2, 0.22, 0.25) * light; 
                
                gl_FragColor = vec4(darkGrey + highlight, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            uniforms: { u_time: { value: 0 }, u_res: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
            vertexShader: `void main(){gl_Position=vec4(position,1.0);}`,
            fragmentShader
        });

        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
        renderer.setSize(window.innerWidth, window.innerHeight);

        function animate(t) {
            material.uniforms.u_time.value = t * 0.001;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(0);

        // --- TRANSICIÓN A LAS MARCAS ---
        const btnEntrar = document.getElementById('btn-entrar');
        const portal = document.getElementById('portal');
        const ecosistema = document.getElementById('ecosistema');

        btnEntrar.addEventListener('click', () => {
            portal.classList.add('hidden');
            setTimeout(() => {
                portal.style.display = 'none';
                ecosistema.classList.add('active');
            }, 800);
        });

        window.onresize = () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
