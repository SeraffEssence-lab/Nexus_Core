<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSL Estrategia | Despacho Jurídico</title>
    <style>
        /* Estética de Búnker: Negro Mate y Oro/Plata */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* Negro profundo */
            color: #d4af37; /* Oro base */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 30px;
            border: 1px solid rgba(214, 175, 55, 0.1); /* Marco sutil */
            background: linear-gradient(145deg, #0f0f0f, #050505);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* El Logo actualizado en HD */
        .logo {
            width: 280px; /* Un poco más grande para lucir el HD */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 15px auto;
        }

        .especialidades {
            color: #a0a0a0;
            font-size: 0.95rem;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        /* Sección de Contactos */
        .contactos {
            margin-bottom: 30px;
        }

        .btn-contacto {
            display: block;
            width: fit-content;
            margin: 10px auto;
            padding: 12px 25px;
            border: 1px solid #d4af37;
            color: #d4af37;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-contacto:hover {
            background-color: #d4af37;
            color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        .phone-label {
            display: block;
            font-size: 0.7rem;
            color: #666;
            margin-top: 15px;
            text-transform: uppercase;
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="balanza logo .png" alt="Firma Legal JSL" class="logo">
        
        <h1>FIRMA LEGAL</h1>
        <div class="divider"></div>
        
        <p class="especialidades">
            Familiares · Penales · Civiles · Laborales<br>
            Amparos · Agrario
        </p>

        <div class="contactos">
            <span class="phone-label">Líneas de Atención Estratégica</span>
            <a href="https://wa.me/525585700849" class="btn-contacto">WhatsApp: 55 8570 0849</a>
            <a href="https://wa.me/525549387580" class="btn-contacto">WhatsApp: 55 4938 7580</a>
        </div>
        
        <p style="font-style: italic; font-size: 0.9rem; color: #d4af37;">"claro, directo y conciso"</p>
    </div>

    <footer>
        &copy; 2026 ECOSISTEMA PRIVADO JSL | SERAFF NEXUS
    </footer>

</body>
</html>
