<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSL Estrategia Jurídica | Excelencia Global</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfdfd;
            background-image: linear-gradient(315deg, #fdfdfd 0%, #ebedee 74%);
            color: #1a1a1a;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 650px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .logo {
            width: 260px;
            height: auto;
            margin-bottom: 30px;
            /* Filtro Rose Gold Metálico */
            filter: sepia(100%) saturate(300%) hue-rotate(-20deg) brightness(95%) contrast(110%) drop-shadow(0 0 10px rgba(183, 110, 121, 0.2));
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            color: #001f3f;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b76e79, transparent);
            margin: 25px auto;
        }

        .especialidades {
            color: #555;
            font-size: 1rem;
            line-height: 2;
            letter-spacing: 1px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .direct-contacts {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-card {
            background: #fcfcfc;
            border: 1px solid rgba(183, 110, 121, 0.15);
            padding: 22px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #001f3f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contact-card:hover {
            border-color: #b76e79;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(183, 110, 121, 0.1);
        }

        .contact-info { text-align: left; }

        .contact-name {
            font-size: 1.1rem;
            font-weight: 600;
            display: block;
        }

        .contact-title {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .contact-action {
            color: #b76e79;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        footer {
            margin-top: 60px;
            font-size: 0.7rem;
            color: #bbb;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <img src="logo general JE.png" alt="Firma Legal JE" class="logo">
        
        <h1>FIRMA LEGAL</h1>
        <div class="divider"></div>
        
        <p class="especialidades">
            Familiares · Penales · Civiles · Laborales<br>
            Amparos · Agrario
        </p>

        <div class="direct-contacts">
            <a href="https://wa.me/525585700849" class="contact-card" target="_blank">
                <div class="contact-info">
                    <span class="contact-name">Lic. Joselyn</span>
                    <span class="contact-title">Atención Estratégica</span>
                </div>
                <div class="contact-action">WHATSAPP</div>
            </a>

            <a href="https://wa.me/525648041249" class="contact-card" target="_blank">
                <div class="contact-info">
                    <span class="contact-name">Lic. Eduardo</span>
                    <span class="contact-title">Atención Estratégica</span>
                </div>
                <div class="contact-action">WHATSAPP</div>
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 ECOSISTEMA JSL | NEXUS ARQUITECTURA
    </footer>

</body>
</html>
